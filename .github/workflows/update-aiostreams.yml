name: Update AIOStreams version
on:
  schedule:
    - cron: '0 6 * * *' 
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get latest upstream version
        id: upstream
        run: |
          VERSION=$(curl -s https://api.github.com/repos/Viren070/AIOStreams/releases/latest \
            | jq -r .tag_name | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get current addon version
        id: current
        run: |
          VERSION=$(grep '^version:' aiostreams/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version and open PR
        if: steps.upstream.outputs.version != steps.current.outputs.version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -b update/aiostreams-v${{ steps.upstream.outputs.version }}
          sed -i 's/^version: .*/version: "${{ steps.upstream.outputs.version }}"/' aiostreams/config.yaml
          git commit -am "Update AIOStreams to v${{ steps.upstream.outputs.version }}"
          git push --force origin update/aiostreams-v${{ steps.upstream.outputs.version }}

      - name: Create pull request
        if: steps.upstream.outputs.version != steps.current.outputs.version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head update/aiostreams-v${{ steps.upstream.outputs.version }} --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "Update AIOStreams to v${{ steps.upstream.outputs.version }}" \
              --body "Upstream [v${{ steps.upstream.outputs.version }}](https://github.com/Viren070/AIOStreams/releases/tag/v${{ steps.upstream.outputs.version }}) is now available." \
              --base main \
              --head update/aiostreams-v${{ steps.upstream.outputs.version }}
          else
            echo "PR #$EXISTING already exists for this version, skipping."
          fi
