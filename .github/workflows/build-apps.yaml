name: Build and Push Addons
on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  fix-permissions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Fix execute permissions
        run: |
          find . -path "*/s6-overlay/s6-rc.d*" \( -name "run" -o -name "finish" -o -name "up" \) \
            | xargs git update-index --chmod=+x
      - name: Commit if changed
        run: |
          if ! git diff --cached --quiet; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git commit -m "Fix s6 script execute permissions"
            git push
          else
            echo "No permission changes needed."
          fi

  changed:
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect changed addons
        uses: dorny/paths-filter@v4
        id: filter
        with:
          base: ${{ github.event_name == 'release' && 'HEAD^' || github.ref }}
          filters: |
            unbound:
              - 'unbound/**'
            aiostreams:
              - 'aiostreams/**'
            music_assistant_alexa_beta:
              - 'music_assistant_alexa_beta/**'

  build:
    needs:
      - changed
      - fix-permissions
    if: ${{ needs.changed.outputs.addons != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        addon: ${{ fromJson(needs.changed.outputs.addons) }}
        arch: [aarch64, amd64]
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get addon version
        id: version
        run: |
          echo "version=$(grep '^version:' ${{ matrix.addon }}/config.yaml | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - name: Set lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Validate addon config
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.addon }}
          file: ${{ matrix.addon }}/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          labels: |
            io.hass.version=${{ steps.version.outputs.version }}
            io.hass.type=addon
            io.hass.arch=${{ matrix.arch }}
            org.opencontainers.image.title=${{ matrix.addon }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.addon }}:${{ steps.version.outputs.version }}-${{ matrix.arch }}

  manifest:
    needs:
      - changed
      - build
    if: ${{ needs.changed.outputs.addons != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        addon: ${{ fromJson(needs.changed.outputs.addons) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get addon version
        id: version
        run: |
          echo "version=$(grep '^version:' ${{ matrix.addon }}/config.yaml | cut -d'"' -f2)" >> $GITHUB_OUTPUT
      - name: Set lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.addon }}"
          VERSION="${{ steps.version.outputs.version }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-aarch64" \
            "${IMAGE}:${VERSION}-amd64"
