name: Build and Push Addons
on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  changed:
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Detect changed addons
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            unbound:
              - 'unbound/**'
            aiostreams:
              - 'aiostreams/**'
            music_assistant_alexa_beta:
              - 'music_assistant_alexa_beta/**'

  build:
    needs: changed
    if: ${{ needs.changed.outputs.addons != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        addon: ${{ fromJson(needs.changed.outputs.addons) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Get addon version
        id: version
        run: |
          echo "version=$(grep '^version:' ${{ matrix.addon }}/config.yaml | cut -d'"' -f2)" >> $GITHUB_OUTPUT
      - name: Set lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.addon }}
          file: ${{ matrix.addon }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.addon }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.addon }}:latest
