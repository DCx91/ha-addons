name: Build and Push Addon

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch: [aarch64, amd64, armv7, armhf, i386]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get addon version
        id: version
        run: |
          echo "version=$(jq -r '.version' unbound/config.yaml)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: unbound
          file: unbound/Dockerfile
          push: true
          platforms: linux/${{ matrix.arch == 'aarch64' && 'arm64' || matrix.arch == 'amd64' && 'amd64' || matrix.arch == 'armv7' && 'arm/v7' || matrix.arch == 'armhf' && 'arm/v6' || 'i386' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/unbound-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/unbound-${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=${{ matrix.arch == 'aarch64' && 'ghcr.io/home-assistant/aarch64-base-alpine:3.22' || matrix.arch == 'amd64' && 'ghcr.io/home-assistant/amd64-base-alpine:3.22' || matrix.arch == 'armv7' && 'ghcr.io/home-assistant/armv7-base-alpine:3.22' || matrix.arch == 'armhf' && 'ghcr.io/home-assistant/armhf-base-alpine:3.22' || 'ghcr.io/home-assistant/i386-base-alpine:3.22' }}
