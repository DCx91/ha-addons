name: Update Changelog on version bump

on:
  push:
    branches:
      - main
    paths:
      - '*/config.yaml'

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth status

      - name: Detect version change and update changelog
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          CHANGED=$(git diff HEAD~1 --name-only | grep 'config.yaml' | cut -d'/' -f1 | sort -u || true)

          for ADDON in $CHANGED; do
            NEW_VERSION=$(sed -n 's/^version:[[:space:]]*"\(.*\)"/\1/p' "${ADDON}/config.yaml")
            OLD_VERSION=$(git show HEAD~1:"${ADDON}/config.yaml" 2>/dev/null | sed -n 's/^version:[[:space:]]*"\(.*\)"/\1/p' || true)

            if [ "$NEW_VERSION" = "$OLD_VERSION" ] || [ -z "${NEW_VERSION}" ]; then
              echo "No version change in ${ADDON}, skipping."
              continue
            fi

            echo "Version changed in ${ADDON}: ${OLD_VERSION} → ${NEW_VERSION}"

            PREV_VERSION_COMMIT=$(git log --format="%H" -- "${ADDON}/config.yaml" | sed -n '2p')

            if [ -n "${PREV_VERSION_COMMIT}" ]; then
              RANGE="${PREV_VERSION_COMMIT}..HEAD"
            else
              RANGE="HEAD"
            fi

            mapfile -t ADDON_COMMITS < <(git log ${RANGE} --format="%H" -- "${ADDON}/" || true)

            PR_LINES=""
            declare -A SEEN_PRS=()

            for SHA in "${ADDON_COMMITS[@]}"; do
              while IFS=$'\t' read -r NUMBER TITLE URL; do
                [ -z "${NUMBER}" ] && continue

                if [ -z "${SEEN_PRS[$NUMBER]+x}" ]; then
                  SEEN_PRS[$NUMBER]=1
                  PR_LINES="${PR_LINES}- ${TITLE} (#${NUMBER})"$'\n'
                fi
              done < <(
                gh api \
                  -H "Accept: application/vnd.github+json" \
                  "/repos/${REPO}/commits/${SHA}/pulls" \
                  --jq '.[] | select(.merged_at != null) | [.number, .title, .html_url] | @tsv' \
                  2>/dev/null || true
              )
            done

            if [ -z "${PR_LINES}" ]; then
              PR_LINES="- No pull requests found for this version bump."
            fi

            CHANGELOG_FILE="${ADDON}/CHANGELOG.md"
            DATE=$(date +%Y-%m-%d)

            [ ! -f "$CHANGELOG_FILE" ] && printf "# Changelog\n\n" > "$CHANGELOG_FILE"

            TEMP=$(mktemp)
            printf "# Changelog\n\n## v%s (%s)\n\n%s\n" "$NEW_VERSION" "$DATE" "$PR_LINES" > "$TEMP"
            tail -n +3 "$CHANGELOG_FILE" >> "$TEMP" 2>/dev/null || true
            mv "$TEMP" "$CHANGELOG_FILE"

            git add "$CHANGELOG_FILE"
            echo "Updated changelog for ${ADDON}"
          done

      - name: Commit changelog
        run: |
          if ! git diff --cached --quiet; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git commit -m "Update changelog for version bump"
            git push
          else
            echo "No changelog changes to commit."
          fi
