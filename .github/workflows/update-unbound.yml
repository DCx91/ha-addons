name: Check Alpine Unbound Version

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-unbound-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Get current Unbound version from Alpine
        id: alpine
        run: |
          VERSION=$(curl -sSL "https://raw.githubusercontent.com/alpinelinux/aports/master/main/unbound/APKBUILD" \
            | sed -n 's/^pkgver=//p' | head -n 1 | tr -d '\r')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get current base version from config.yaml
        id: current
        run: |
          VERSION=$(yq -r '.version | sub("-R[0-9]+$"; "")' unbound/config.yaml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update config.yaml if version changed
        if: steps.alpine.outputs.version != steps.current.outputs.version
        run: |
          NEW="${{ steps.alpine.outputs.version }}-R1"
          yq -i '.version = strenv(NEW)' unbound/config.yaml

      - name: Open PR if changed
        if: steps.alpine.outputs.version != steps.current.outputs.version
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: bump Unbound to ${{ steps.alpine.outputs.version }}"
          title: "Unbound ${{ steps.alpine.outputs.version }} available"
          body: |
            Alpine has updated Unbound to `${{ steps.alpine.outputs.version }}` (was `${{ steps.current.outputs.version }}`).

            Please verify the addon builds and functions correctly before merging.
          branch: "chore/unbound-${{ steps.alpine.outputs.version }}"
          delete-branch: true
