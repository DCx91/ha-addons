configuration:
  base_url:
    name: Base URL
    description: >-
      The public URL of this addon, e.g. https://[domain].duckdns.org.
      HTTPS is required for built-in addons, install links, and stream URL generation
      to work correctly. 
  log_level:
    name: Log Level
    description: >-
      Verbosity of addon logs. 'info', 'warning', or 'error' is recommended for normal use. Use
      'debug' or 'verbose' when troubleshooting issues.
  trakt_id:
    name: Trakt Client ID
    description: >-
      Provide a trakt client ID for authorised requests to get trakt aliases.
      You can create a key here: https://trakt.tv/oauth/applications
  addon_password:
    name: Addon Password
    description: >-
      API key to protect your addon installation and usage.
      Leave empty to disable password protection.
      Can be any string. Supports multiple passwords separated by commas.
  low_ram:
    name: Reduced Memory Consumption
    description: >-
      Reduces memory consumption by ~100MB by reducing the cache size and preventing
      anime from being pre-loaded into the database on boot.
  sensitive_info:
    name: Sensitive info
    description: >-
      Includes potentially sensitive info (like API keys) in logs for debugging.
  secret_key:
    name: Secret Key
    description: >-
      64-character hex key used to encrypt addon configurations. Leave blank to
      auto-generate one on first start. If you change this, all existing user
      configurations will be invalidated.
  postgresql:
    name: PostgreSQL Enabled
    description: >-
      Enables PostgreSQL database over SQLite. The following options are required when enabled.
  postgresql_host:
   name: PostgreSQL Hostname
    description: >-
      Hostname of your PostgreSQL database. If using the Home Assistant PostgreSQL app, use 'localhost'.
  postgresql_port:
   name: PostgreSQL Port
    description: >-
      Port number for your PostgreSQL database.
  postgresql_username:
   name: PostgreSQL Username
    description: >-
      Username for your PostgreSQL database.
  postgresql_password:
   name: PostgreSQL Password
    description: >-
      Password for your PostgreSQL database.
  postgresql_database:
   name: PostgreSQL Database
    description: >-
      Name of your PostgreSQL database.
