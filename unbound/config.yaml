name: Unbound DNS
version: "1.24.2-R1"
slug: unbound
description: >-
  A validating, recursive, and caching DNS resolver
url: "https://github.com/DCx91/ha-addons/unbound"
arch:
  - aarch64
  - amd64
startup: system
init: false
image: ghcr.io/dcx91/unbound
ports:
  5335/udp: 5335
  5335/tcp: 5335
map:
  - addon_config:rw
apparmor: true
options:
  log_level: "1 - Operational"
  do_ipv6: false
  num_threads: 1
schema:
  log_level: list(0 - Error|1 - Operational|2 - Detailed|3 - Query|4 - Algorithm|5 - Cache Misses)
  do_ipv6: bool
  num_threads: int(1,32)
  hyperlocal: bool?
  persist_cache: bool?
  cache_min_ttl: int(0,3600)?
  cache_max_ttl: int(60,604800)?
  access_control:
    - str?
  custom_config: str?
