name: Unbound DNS
version: "1.25.1-R7"
slug: unbound
description: >-
  A validating, recursive, and caching DNS resolver
url: "https://github.com/DCx91/ha-addons/unbound"
arch:
  - aarch64
  - amd64
startup: system
hassio_api: true
init: false
image: ghcr.io/dcx91/unbound
ports:
  5335/udp: 5335
  5335/tcp: 5335
map:
  - addon_config:rw
options:
  do_ipv6: false
  unbound_verbosity: 1
schema:
  do_ipv6: bool
  unbound_verbosity: list(0|1|2|3|4|5)
  num_threads: int(1,32)?
  no_persist_cache: bool?
  cache_min_ttl: int(0,3600)?
  cache_max_ttl: int(60,604800)?
